name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate config.js from secrets
        run: |
          cat > scripts/config.js << 'CONFIGEOF'
          export const FIREBASE_CONFIG = {
              apiKey: "${{ secrets.FIREBASE_API_KEY }}",
              authDomain: "${{ secrets.FIREBASE_AUTH_DOMAIN }}",
              projectId: "${{ secrets.FIREBASE_PROJECT_ID }}",
              storageBucket: "${{ secrets.FIREBASE_STORAGE_BUCKET }}",
              messagingSenderId: "${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}",
              appId: "${{ secrets.FIREBASE_APP_ID }}",
              measurementId: "${{ secrets.FIREBASE_MEASUREMENT_ID }}"
          };

          export const EMAILJS_CONFIG = {
              publicKey: "${{ secrets.EMAILJS_PUBLIC_KEY }}",
              serviceId: "${{ secrets.EMAILJS_SERVICE_ID }}",
              bookingTemplateId: "${{ secrets.EMAILJS_BOOKING_TEMPLATE_ID }}",
              guestConfirmTemplateId: "${{ secrets.EMAILJS_GUEST_CONFIRM_TEMPLATE_ID }}"
          };

          export const NTFY_TOPIC = "${{ secrets.NTFY_TOPIC }}";
          export const ADMIN_PIN = "${{ secrets.ADMIN_PIN }}";
          export const OWNER_EMAIL = "${{ secrets.OWNER_EMAIL }}";
          export const ADMIN_PHONES = ["${{ secrets.ADMIN_PHONE }}"];
          export const RESORT_PHONE = "${{ secrets.RESORT_PHONE }}";
          CONFIGEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
